name: RobotMonetisation

on: [workflow_dispatch]

jobs:
  run-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer Fichiers
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Lancer Machine Audio
        run: |
          pip install gTTS
          python -c "from gtts import gTTS; gTTS('Abonne-toi pour découvrir le secret', lang='fr').save('short.mp3')"

      - name: Telecharger Le Resultat
        uses: actions/upload-artifact@v4
        with:
          name: AudioPret
          path: short.mp3
